<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4주차 식단표</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(140deg, #f7efe3, #e6f2ef);
      color: #2f2a24;
    }

    a {
      color: #7a3f22;
      text-decoration: none;
      border-bottom: 1px solid rgba(122, 63, 34, 0.4);
    }
  </style>
</head>
<body>
  <p id="loadingText">페이지를 불러오는 중입니다...</p>
  <script>
    (async function loadMainPage() {
      try {
        const response = await fetch("./week4-meal-plan.html", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("메인 페이지를 불러오지 못했습니다.");
        }
        const html = await response.text();
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        const loadingText = document.getElementById("loadingText");
        if (loadingText) {
          loadingText.innerHTML = `불러오기에 실패했습니다. <a href="./week4-meal-plan.html">직접 열기</a>`;
        }
      }
    })();
  </script>
</body>
</html>
