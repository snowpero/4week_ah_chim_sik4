<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4주차 식단표 (평일 5일)</title>
  <style>
    :root {
      --bg-top: #f7efe3;
      --bg-bottom: #e6f2ef;
      --card: #fffdf8;
      --text: #2f2a24;
      --muted: #6f6457;
      --line: #e7dbcc;
      --accent: #b45f3a;
      --accent-soft: #f8e5d8;
      --shadow: 0 12px 30px rgba(64, 49, 33, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      width: min(1000px, 92vw);
      margin: 36px auto 48px;
    }

    .title-box {
      background: rgba(255, 253, 248, 0.8);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px 22px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3.8vw, 2.2rem);
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid #efcfbe;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .random-button {
      appearance: none;
      border: 1px solid #d7b19b;
      background: linear-gradient(180deg, #fff5ef, #ffe9dd);
      color: #7a3f22;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 6px 14px rgba(122, 63, 34, 0.12);
    }

    .random-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(122, 63, 34, 0.16);
    }

    .secondary-button {
      appearance: none;
      border: 1px solid #d5cabf;
      background: #fffdf8;
      color: #5f5144;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 6px 14px rgba(86, 72, 60, 0.08);
    }

    .secondary-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(86, 72, 60, 0.12);
    }

    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      animation: cardIn 260ms ease both;
    }

    .day {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }

    .menus {
      margin: 10px 0 0;
      padding-left: 18px;
    }

    .menus li {
      margin: 5px 0;
    }

    .sources {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      font-size: 0.88rem;
      color: var(--muted);
    }

    .sources a {
      color: #7b4427;
      text-decoration: none;
      border-bottom: 1px solid rgba(123, 68, 39, 0.35);
    }

    .sources a:hover {
      border-bottom-color: rgba(123, 68, 39, 0.9);
    }

    .footer-note {
      margin-top: 14px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .updated-at {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .mode-note {
      margin-top: 8px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .wrap {
        margin-top: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="title-box">
      <h1>4주차 식단표 (평일 5일)</h1>
      <p class="sub">메뉴는 유튜브 <strong>@dalgomsamsam</strong> 채널의 <code>/videos</code> 원본 항목(제목/설명)에서만 가져왔습니다.</p>
      <span class="badge">국/탕 1 + 메인 1 + 사이드 1</span>
      <div class="actions">
        <button id="randomizeButton" class="random-button" type="button">랜덤으로 갱신</button>
        <button id="showFixedButton" class="secondary-button" type="button">기본 4주차 보기</button>
      </div>
      <p id="modeNote" class="mode-note"></p>
    </section>

    <section id="planGrid" class="grid" aria-label="4주차 평일 식단"></section>

    <p class="footer-note">※ 주말은 제외했으며, 메뉴명은 채널 영상 제목/설명에 등장한 표현을 우선으로 사용했습니다.</p>
    <p id="updatedAt" class="updated-at"></p>
  </main>

  <script>
    const weekdayNames = ["월요일", "화요일", "수요일", "목요일", "금요일"];
    const recentSignatures = [];
    const historyLimit = 5;
    const stopWords = /(영상|구독|이벤트|레시피|시청|감사|출간|응모|선물|제품|안내|사용한|재료|시작|오프닝|학교|등교|개학|방학|저녁밥|아침밥모음|우리|달곰)/;
    const MENU_SUFFIXES = [
      "계란말이", "샤브샤브", "닭한마리", "만두랑땡", "동그랑땡", "피자계란빵", "피자감자채전",
      "설렁탕", "곰탕", "찌개", "볶음", "구이", "조림", "채전", "덮밥", "주먹밥", "김밥", "초밥",
      "샐러드", "우동", "떡국", "떡볶이", "카레", "퀘사디아", "스테이크", "돈까스", "마파두부",
      "개장", "짜글이", "스무디", "과자", "피자빵", "국", "탕", "전", "빵"
    ];
    const menuSuffixPattern = MENU_SUFFIXES.join("|");
    let mealBank = { soups: [], mains: [], sides: [] };
    let fixedWeekPlan = [];

    function shuffle(items) {
      const array = [...items];
      for (let index = array.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [array[index], array[randomIndex]] = [array[randomIndex], array[index]];
      }
      return array;
    }

    function normalizeMenuText(value) {
      return String(value || "")
        .replace(/\([^)]*\)/g, " ")
        .replace(/[✔️⭐✨*#<>\[\]{}]/g, " ")
        .replace(/\d{1,2}:\d{2}/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function dedupePreserveOrder(items) {
      const seen = new Set();
      const result = [];
      items.forEach((item) => {
        const trimmed = String(item || "").trim();
        if (!trimmed || seen.has(trimmed)) {
          return;
        }
        seen.add(trimmed);
        result.push(trimmed);
      });
      return result;
    }

    function splitMenuCandidates(text) {
      return String(text || "")
        .replace(/[✔️⭐✨*#<>\[\]{}]/g, " ")
        .replace(/\d{1,2}:\d{2}/g, " ")
        .split(/[,.!?·|]|그리고|\/|\n/g)
        .map((value) => value.trim())
        .filter(Boolean);
    }

    function extractByRegex(text) {
      const cleaned = normalizeMenuText(text);
      const noSpace = cleaned.replace(/\s+/g, "");
      const regex = new RegExp(`([가-힣A-Za-z0-9]{1,14}?(?:${menuSuffixPattern}))`, "g");
      const results = [];

      const fromCleaned = cleaned.match(regex) || [];
      fromCleaned.forEach((item) => results.push(item.trim()));

      const fromNoSpace = noSpace.match(regex) || [];
      fromNoSpace.forEach((item) => results.push(item.trim()));

      return results;
    }

    function isMenuLikePhrase(phrase) {
      if (phrase.length < 2 || phrase.length > 24) {
        return false;
      }
      if (stopWords.test(phrase)) {
        return false;
      }
      return /(국|탕|찌개|볶음|구이|조림|전|채전|덮밥|주먹밥|김밥|초밥|계란말이|샐러드|우동|떡국|떡볶이|카레|퀘사디아|스테이크|돈까스|마파두부|설렁탕|곰탕|개장|짜글이|샤브샤브|닭한마리|피자빵|피자계란빵|피자감자채전|과자|동그랑땡|만두랑땡|빵|스무디)$/.test(phrase);
    }

    function classifyMenu(phrase) {
      if (/(국|탕|찌개|설렁탕|곰탕|우동|떡국|개장|순두부)$/.test(phrase)) {
        return "soup";
      }
      if (/(볶음|구이|조림|주물럭|돈까스|스테이크|마파두부|샤브샤브|닭한마리|카레)$/.test(phrase)) {
        return "main";
      }
      if (/(전|채전|덮밥|주먹밥|김밥|초밥|계란말이|샐러드|과자|빵|스무디|만두랑땡|동그랑땡)$/.test(phrase)) {
        return "side";
      }
      return null;
    }

    function extractMenusFromVideo(video) {
      const combined = [];
      splitMenuCandidates(video.title).forEach((item) => combined.push(item));
      splitMenuCandidates(video.descriptionSnippet).forEach((item) => combined.push(item));
      extractByRegex(video.title).forEach((item) => combined.push(item));
      extractByRegex(video.descriptionSnippet).forEach((item) => combined.push(item));

      const soups = [];
      const mains = [];
      const sides = [];

      dedupePreserveOrder(combined).forEach((candidate) => {
        if (!isMenuLikePhrase(candidate)) {
          return;
        }
        const category = classifyMenu(candidate);
        if (category === "soup") {
          soups.push(candidate);
          return;
        }
        if (category === "main") {
          mains.push(candidate);
          return;
        }
        if (category === "side") {
          sides.push(candidate);
        }
      });

      return {
        soups: dedupePreserveOrder(soups),
        mains: dedupePreserveOrder(mains),
        sides: dedupePreserveOrder(sides)
      };
    }

    function pickSourceTitle(video) {
      const trimmed = normalizeMenuText(video.title);
      return trimmed || "메뉴 출처";
    }

    function buildMealBank(videos) {
      const soupMap = new Map();
      const mainMap = new Map();
      const sideMap = new Map();

      videos.forEach((video) => {
        const extracted = extractMenusFromVideo(video);
        const source = { title: pickSourceTitle(video), url: video.url };

        extracted.soups.forEach((name) => {
          if (!soupMap.has(name)) {
            soupMap.set(name, { name, source });
          }
        });
        extracted.mains.forEach((name) => {
          if (!mainMap.has(name)) {
            mainMap.set(name, { name, source });
          }
        });
        extracted.sides.forEach((name) => {
          if (!sideMap.has(name)) {
            sideMap.set(name, { name, source });
          }
        });
      });

      return {
        soups: Array.from(soupMap.values()),
        mains: Array.from(mainMap.values()),
        sides: Array.from(sideMap.values())
      };
    }

    function pickDistinctWithOffset(pool, count, seed) {
      if (pool.length === 0) {
        return [];
      }
      const selected = [];
      const used = new Set();
      let index = seed % pool.length;
      while (selected.length < count && used.size < pool.length) {
        const item = pool[index];
        if (!used.has(item.name)) {
          selected.push(item);
          used.add(item.name);
        }
        index = (index + 1) % pool.length;
      }
      return selected;
    }

    function buildWeekFromBank(bank, seed = 0) {
      const soups = pickDistinctWithOffset(bank.soups, 5, seed + 1);
      const mains = pickDistinctWithOffset(bank.mains, 5, seed + 7);
      const sides = pickDistinctWithOffset(bank.sides, 5, seed + 13);

      const dayCount = Math.min(soups.length, mains.length, sides.length, 5);
      const result = [];
      for (let dayIndex = 0; dayIndex < dayCount; dayIndex += 1) {
        const soup = soups[dayIndex];
        const main = mains[dayIndex];
        const side = sides[dayIndex];
        const sourceMap = new Map();
        [soup.source, main.source, side.source].forEach((source) => {
          sourceMap.set(source.url, source);
        });
        result.push({
          menus: [soup.name, main.name, side.name],
          sources: Array.from(sourceMap.values())
        });
      }
      return result;
    }

    function makeSignature(plans) {
      return plans
        .map((plan) => plan.menus.join("|"))
        .join("||");
    }

    function getRandomWeekPlanWithoutRecentRepeat() {
      const maxAttempt = 80;
      if (!mealBank.soups.length || !mealBank.mains.length || !mealBank.sides.length) {
        return [];
      }

      for (let attemptIndex = 0; attemptIndex < maxAttempt; attemptIndex += 1) {
        const randomSeed = Math.floor(Math.random() * 5000) + attemptIndex;
        const candidate = buildWeekFromBank(mealBank, randomSeed);
        const signature = makeSignature(candidate);
        if (!recentSignatures.includes(signature)) {
          recentSignatures.push(signature);
          if (recentSignatures.length > historyLimit) {
            recentSignatures.shift();
          }
          return candidate;
        }
      }

      const fallback = buildWeekFromBank(mealBank, Math.floor(Math.random() * 9999));
      const fallbackSignature = makeSignature(fallback);
      recentSignatures.push(fallbackSignature);
      if (recentSignatures.length > historyLimit) {
        recentSignatures.shift();
      }
      return fallback;
    }

    function renderWeekPlan(selectedPlans, modeLabel) {
      const gridElement = document.getElementById("planGrid");
      gridElement.innerHTML = "";

      if (!selectedPlans.length) {
        document.getElementById("modeNote").textContent = "표시할 식단 데이터가 부족합니다.";
        return;
      }

      selectedPlans.forEach((plan, dayIndex) => {
        const article = document.createElement("article");
        article.className = "card";
        article.style.animationDelay = `${dayIndex * 70}ms`;

        const menuList = plan.menus
          .map((menu) => `<li>${menu}</li>`)
          .join("");

        const sourceLinks = plan.sources
          .map(
            (source) =>
              `<a href="${source.url}" target="_blank" rel="noopener noreferrer">${source.title}</a>`
          )
          .join(", ");

        article.innerHTML = `
          <h2 class="day">${weekdayNames[dayIndex]}</h2>
          <ul class="menus">${menuList}</ul>
          <div class="sources">출처: ${sourceLinks}</div>
        `;

        gridElement.appendChild(article);
      });

      const now = new Date();
      const updatedLabel = now.toLocaleString("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
      document.getElementById("updatedAt").textContent = `최근 갱신: ${updatedLabel}`;
      document.getElementById("modeNote").textContent = `현재 표시: ${modeLabel} | 메뉴 풀: 최근 100개 영상 기반(분류 강화) | 랜덤 중복 방지: 최근 ${historyLimit}회`;
    }

    async function initialize() {
      const response = await fetch("https://raw.githubusercontent.com/snowpero/4week_ah_chim_sik4/main/videos-100.json", { cache: "no-store" });
      const videos = await response.json();
      mealBank = buildMealBank(videos);
      fixedWeekPlan = buildWeekFromBank(mealBank, 0);

      document.getElementById("randomizeButton").addEventListener("click", () => {
        const randomPlan = getRandomWeekPlanWithoutRecentRepeat();
        renderWeekPlan(randomPlan, "랜덤 4주차(평일 5일)");
      });

      document.getElementById("showFixedButton").addEventListener("click", () => {
        renderWeekPlan(fixedWeekPlan, "기본 4주차(평일 5일)");
      });

      renderWeekPlan(fixedWeekPlan, "기본 4주차(평일 5일)");
    }

    initialize().catch((error) => {
      document.getElementById("modeNote").textContent = `데이터 로드 실패: ${error.message}`;
    });
  </script>
</body>
</html>
